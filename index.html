<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 3 CSS_Animations</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="loader-wrapper">
      <div class="loader"></div>
    </div>
    <header>
      <div class="heroImage">
        <div class="topBar">
          <div class="logo">
            <p>GearTrail</p>
          </div>
          <div class="navBar">
            <nav>
              <a class="links" href="#Home">Home</a>
              <a class="links" href="#Shop">Shop</a>
              <a class="links" href="#About">About</a>
              <a class="links" href="#Contact">Contact</a>
            </nav>
          </div>
        </div>

        <div class="heroText">
          <h1>Adventure Starts Here</h1>
          <p>Premium hiking gear designed for explorers.</p>
        </div>
      </div>
    </header>

    <main>
      <h3>Featured Products</h3>
      <div class="productCards">
        <div class="card">
          <img
            src="https://cdn.shopify.com/s/files/1/0253/1626/1993/files/what-size-backpack-do-I-need-13.jpg?v=1614962626&width=950"
            alt="Hiking Backpack"
          />
          <h4>Hiking Backpack</h4>
          <p>R1299</p>
          <button>Add to cart</button>
        </div>

        <div class="card">
          <img
            src="https://cdn.thewirecutter.com/wp-content/media/2022/04/hikingboots-2048px-DSCF7462-2x1-1.jpg?width=1536&quality=75&crop=2:1&auto=webp"
            alt="Hiking Boots"
          />
          <h4>Hiking Boots</h4>
          <p>R1899</p>
          <button>Add to cart</button>
        </div>

        <div class="card">
          <img
            src="https://www.naturehike.co.za/cdn/shop/files/3_6e97baf7-9ea0-437b-818d-8e27bc218741.jpg?v=1764685693&width=1080"
            alt="Camping Tent"
          />
          <h4>Camping Tent</h4>
          <p>R2499</p>
          <button>Add to cart</button>
        </div>

        <div class="card">
          <img
            src="https://www.three6ixty.co.za/wp-content/uploads/product/GP-AL-65-B/default_1024X1024_0.webp"
          />
          <h4>Stainless Steel Water Bottle</h4>
          <p>R349</p>
          <button>Add to cart</button>
        </div>

        <div class="card">
          <img
            src="https://m.media-amazon.com/images/I/81u3EHMoGDL._AC_SX679_.jpg"
            alt="Hiking Jacket"
          />
          <h4>Hiking Jacket and Pants</h4>
          <p>R1599</p>
          <button>Add to cart</button>
        </div>

        <div class="card">
          <img
            src="https://m.media-amazon.com/images/I/71GdOe7EbnL._AC_SX679_.jpg"
            alt="Portable Lantern"
          />
          <h4>Portable Lantern</h4>
          <p>R499</p>
          <button>Add to cart</button>
        </div>
      </div>
    </main>
  </body>
</html>
